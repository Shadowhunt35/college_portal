version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COLLEGE_CODE=113
    volumes:
      - ./logs:/app/logs
      - ./static/uploads:/app/static/uploads
      - ./artifacts:/app/artifacts
    restart: unless-stopped

