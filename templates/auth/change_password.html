{% extends 'base.html' %}
{% block title %}Change Password — College Portal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">

    <div class="text-center mb-4">
      <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
      <h2 class="fw-bold mt-2">Change Password</h2>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.change_password') }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" name="old_password"
                   class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password"
                   class="form-control"
                   placeholder="Minimum 6 characters" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" name="confirm_password"
                   class="form-control" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-2"></i>Update Password
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center mt-3">
      <a href="{{ url_for(get_dashboard_route(current_user.role)) }}"
         class="text-muted">
        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
      </a>
    </div>

  </div>
</div>
{% endblock %}
